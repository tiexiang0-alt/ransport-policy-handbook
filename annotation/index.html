<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Essay Annotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-serif {
            font-family: 'Merriweather', serif;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "lucide-react": "https://esm.sh/lucide-react@latest?deps=react@18"
        }
    }
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { CheckCircle2, Sparkles, Info, BookOpen, MessageSquare, Award, PenTool } from 'lucide-react';

        const e = React.createElement;

        function App() {
            const [hoveredId, setHoveredId] = useState(null);
            const [hoveredModelId, setHoveredModelId] = useState(null);

            const annotations = [
                {
                    id: 1,
                    original: "views compare to",
                    suggested: "views compared to",
                    reason: "Grammar: Past participle 'compared' is required here to form the passive phrase modifying 'views'."
                },
                {
                    id: 2,
                    original: "I have been visited many metropolitans",
                    suggested: "I have visited many metropolitan areas",
                    reason: "Grammar/Vocabulary: 'Have been visited' is incorrect passive voice. 'Metropolitan' is an adjective, requiring a noun like 'areas' or 'cities'."
                },
                {
                    id: 3,
                    original: "rise the cost",
                    suggested: "raise the cost",
                    reason: "Vocabulary: 'Raise' is a transitive verb (requires an object, like 'the cost'), whereas 'rise' is intransitive."
                },
                {
                    id: 4,
                    original: "way more better compare to",
                    suggested: "much better than",
                    reason: "Syntax/Redundancy: 'More better' is a double comparative. 'Compared to' is awkward here; 'than' is the standard comparative conjunction."
                },
                {
                    id: 5,
                    original: "children disable groups, students and elder people. this can be seen really common",
                    suggested: "children, disabled individuals, students, and the elderly. This is very common",
                    reason: "Punctuation/Phrasing: Capitalization required at the start of a sentence. 'Disable groups' and 'elder people' are awkward; standard terms are 'disabled individuals' and 'the elderly'."
                }
            ];

            const modelHighlights = [
                {
                    id: 'm1',
                    text: "Rather than offering blanket free transit, a more effective strategy is to",
                    type: "句式结构 (Rhetorical Structure)",
                    explanation: "使用 'Rather than...' (与其...) 作为对比性引导短语，平滑地从他人的观点过渡到作者自己截然不同的立场，符合标准学术辩论结构。"
                },
                {
                    id: 'm2',
                    text: "deters excessive automobile use while generating revenue",
                    type: "高级词汇与语法 (Vocabulary & Syntax)",
                    explanation: "使用高级动词 'deter' (威慑/阻止)。'while + 动名词 (generating)' 的结构简洁地表达了同时发生的两个积极因果关系（即：一箭双雕）。"
                },
                {
                    id: 'm3',
                    text: "To address the needs of low-income residents,",
                    type: "句式结构 (Infinitive Phrase of Purpose)",
                    explanation: "将表示目的的不定式短语置于句首。这种结构在引出具体的政策解决方案之前，清晰地设定了上下文和目标群体，逻辑严密。"
                }
            ];

            function Highlight({ id, text }) {
                const isHovered = hoveredId === id;
                return e('span', {
                    onMouseEnter: () => setHoveredId(id),
                    onMouseLeave: () => setHoveredId(null),
                    className: `cursor-pointer transition-colors duration-200 border-b-2 ${isHovered
                            ? 'bg-indigo-100 border-indigo-400 text-indigo-900'
                            : 'bg-red-50 border-red-300 text-red-900'
                        }`
                }, text);
            }

            function ModelHighlight({ id, text }) {
                const isHovered = hoveredModelId === id;
                return e('span', {
                    onMouseEnter: () => setHoveredModelId(id),
                    onMouseLeave: () => setHoveredModelId(null),
                    className: `cursor-pointer transition-all duration-200 rounded px-1 ${isHovered
                            ? 'bg-amber-200 text-amber-900 shadow-sm'
                            : 'bg-amber-100 text-amber-800'
                        }`
                }, text);
            }

            return e('div', { className: 'min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800' },
                e('div', { className: 'max-w-7xl mx-auto space-y-6' },

                    // Header
                    e('header', { className: 'mb-8 border-b pb-4' },
                        e('h1', { className: 'text-3xl font-bold text-gray-900 flex items-center gap-2' },
                            e(BookOpen, { className: 'text-indigo-600' }),
                            'Interactive Essay Annotation'
                        ),
                        e('p', { className: 'text-gray-500 mt-2 text-sm' },
                            'Objective grammatical evaluation based on standard English conventions. Hover over highlighted text to view corrections and structural analysis.'
                        )
                    ),

                    e('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-8' },

                        // Left Column
                        e('div', { className: 'space-y-6' },

                            // Context Section
                            e('section', { className: 'bg-white p-6 rounded-xl shadow-sm border border-gray-100' },
                                e('h2', { className: 'text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2' },
                                    e(MessageSquare, { className: 'w-5 h-5 text-gray-400' }),
                                    'Discussion Context'
                                ),
                                e('div', { className: 'space-y-4 text-sm' },
                                    e('div', { className: 'bg-gray-50 p-4 rounded-lg border-l-4 border-gray-300' },
                                        e('strong', { className: 'text-gray-700 block mb-1' }, "Professor's Prompt:"),
                                        'Are free public transportation systems an effective strategy for modern cities, or are there better ways to spend municipal funds?'
                                    ),
                                    e('div', { className: 'grid grid-cols-2 gap-4' },
                                        e('div', { className: 'bg-blue-50 p-3 rounded-lg border border-blue-100' },
                                            e('strong', { className: 'text-blue-800 block mb-1 text-xs uppercase' }, 'Alice (Pro-Free)'),
                                            'Removes financial barriers, incentivizes leaving cars, decreases emissions.'
                                        ),
                                        e('div', { className: 'bg-orange-50 p-3 rounded-lg border border-orange-100' },
                                            e('strong', { className: 'text-orange-800 block mb-1 text-xs uppercase' }, 'Bob (Pro-Investment)'),
                                            'Funds better spent on infrastructure. Unreliability, not cost, is the main barrier.'
                                        )
                                    )
                                )
                            ),

                            // Original Essay
                            e('section', { className: 'bg-white p-6 rounded-xl shadow-sm border border-gray-100' },
                                e('h2', { className: 'text-lg font-semibold text-gray-900 mb-4 border-b pb-2' }, 'Original Submission'),
                                e('div', { className: 'prose max-w-none text-gray-800 leading-loose text-lg' },
                                    e('p', null,
                                        'I have very different ',
                                        e(Highlight, { id: 1, text: 'views compare to' }),
                                        ' them both. ',
                                        e(Highlight, { id: 2, text: 'I have been visited many metropolitans' }),
                                        ' in Asia. I believe that the way to ',
                                        e(Highlight, { id: 3, text: 'rise the cost' }),
                                        ' of driving is ',
                                        e(Highlight, { id: 4, text: 'way more better compare to' }),
                                        " the professor's cases. Tokyo or Singapore, for example, they either increase the consuming tax or price of gasoline which can avoid the abuse of automobile and make the financial income on the investment on public transits. Regarding the low-income resident mentioned by Alice, the related department could Launch policy or discount to support them such as ",
                                        e(Highlight, { id: 5, text: 'children disable groups, students and elder people. this can be seen really common' }),
                                        ' in Europe and Australia.'
                                    )
                                )
                            )
                        ),

                        // Right Column
                        e('div', { className: 'space-y-6' },

                            // Overall Evaluation
                            e('section', { className: 'bg-white p-6 rounded-xl shadow-sm border border-gray-100' },
                                e('div', { className: 'flex items-center gap-2 mb-4' },
                                    e(CheckCircle2, { className: 'text-emerald-500 w-6 h-6' }),
                                    e('h2', { className: 'text-xl font-semibold text-gray-900' }, 'Overall Evaluation')
                                ),
                                e('div', { className: 'bg-gray-50 p-5 rounded-xl text-gray-700 leading-relaxed text-sm' },
                                    "Your response effectively contributes to the academic discussion by introducing a novel idea: increasing the cost of driving to subsidize public transit. You also successfully integrate Alice's concern about low-income residents and propose a targeted solution. However, the essay is held back by frequent grammatical errors, incorrect word forms, and awkward phrasing that sometimes obscure your meaning. Improving sentence structure and vocabulary accuracy will help raise your score."
                                )
                            ),

                            // Corrections List
                            e('section', { className: 'bg-white p-6 rounded-xl shadow-sm border border-gray-100' },
                                e('div', { className: 'flex items-center gap-2 mb-6' },
                                    e(Sparkles, { className: 'text-indigo-500 w-6 h-6' }),
                                    e('h2', { className: 'text-xl font-semibold text-gray-900' }, 'Suggested Corrections')
                                ),
                                e('div', { className: 'space-y-3' },
                                    ...annotations.map(item =>
                                        e('div', {
                                            key: item.id,
                                            onMouseEnter: () => setHoveredId(item.id),
                                            onMouseLeave: () => setHoveredId(null),
                                            className: `p-4 rounded-lg border transition-all duration-200 cursor-default ${hoveredId === item.id
                                                    ? 'bg-indigo-50 border-indigo-200 shadow-md ring-1 ring-indigo-200 scale-[1.01]'
                                                    : 'bg-indigo-50/30 border-transparent hover:bg-indigo-50/60'
                                                }`
                                        },
                                            e('div', { className: 'text-gray-800 text-sm' },
                                                'Change ',
                                                e('span', { className: 'text-rose-600 font-medium px-1 bg-rose-50 rounded' }, `'${item.original}'`),
                                                ' to ',
                                                e('span', { className: 'text-emerald-700 font-medium px-1 bg-emerald-50 rounded' }, `'${item.suggested}'`),
                                                '.'
                                            ),
                                            hoveredId === item.id && e('div', { className: 'mt-3 text-xs text-indigo-800 bg-indigo-100/50 p-2 rounded flex items-start gap-2' },
                                                e(Info, { className: 'w-4 h-4 flex-shrink-0 mt-0.5 opacity-70' }),
                                                e('span', null, item.reason)
                                            )
                                        )
                                    )
                                )
                            )
                        ),

                        // Model Answer (Full Width)
                        e('div', { className: 'lg:col-span-2 mt-4' },
                            e('section', { className: 'bg-gradient-to-br from-amber-50 to-white p-6 md:p-8 rounded-xl shadow-sm border border-amber-200' },
                                e('div', { className: 'flex flex-col md:flex-row gap-8' },

                                    // Model Text
                                    e('div', { className: 'flex-1' },
                                        e('div', { className: 'flex items-center gap-2 mb-4 border-b border-amber-200 pb-2' },
                                            e(Award, { className: 'text-amber-500 w-6 h-6' }),
                                            e('h2', { className: 'text-xl font-semibold text-amber-900' }, 'Model Answer')
                                        ),
                                        e('div', { className: 'prose max-w-none text-gray-800 leading-loose text-lg font-serif' },
                                            e('p', null,
                                                'While Alice and Bob present valid points, I approach this issue from a different perspective based on my observations of Asian metropolitan areas. ',
                                                e(ModelHighlight, { id: 'm1', text: 'Rather than offering blanket free transit, a more effective strategy is to' }),
                                                ' raise the cost of driving. Cities like Tokyo and Singapore have successfully implemented this by increasing consumption taxes or gasoline prices, which ',
                                                e(ModelHighlight, { id: 'm2', text: 'deters excessive automobile use while generating revenue' }),
                                                ' to invest in public transit infrastructure. ',
                                                e(ModelHighlight, { id: 'm3', text: 'To address the needs of low-income residents,' }),
                                                " as Alice mentioned, municipal governments can implement targeted subsidies or discounted fares for specific demographics, such as children, disabled individuals, students, and the elderly. This targeted approach, commonly seen in Europe and Australia, ensures equitable access without straining the overall municipal budget."
                                            )
                                        )
                                    ),

                                    // Structural Analysis
                                    e('div', { className: 'w-full md:w-1/3 space-y-4' },
                                        e('div', { className: 'flex items-center gap-2 mb-4 border-b border-amber-200 pb-2' },
                                            e(PenTool, { className: 'text-amber-600 w-5 h-5' }),
                                            e('h3', { className: 'text-lg font-semibold text-amber-900' }, 'Structural Analysis')
                                        ),
                                        ...modelHighlights.map(item =>
                                            e('div', {
                                                key: item.id,
                                                onMouseEnter: () => setHoveredModelId(item.id),
                                                onMouseLeave: () => setHoveredModelId(null),
                                                className: `p-4 rounded-lg border transition-all duration-200 ${hoveredModelId === item.id
                                                        ? 'bg-white border-amber-300 shadow-md ring-1 ring-amber-300'
                                                        : 'bg-white/50 border-amber-100 hover:bg-white'
                                                    }`
                                            },
                                                e('h4', { className: 'text-xs font-bold text-amber-700 uppercase tracking-wide mb-1' }, item.type),
                                                e('p', { className: 'text-sm text-gray-700 mb-2 font-medium italic' }, `"${item.text}..."`),
                                                e('p', { className: 'text-xs text-gray-600 leading-relaxed' }, item.explanation)
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    // Footer
                    e('footer', { className: 'mt-12 text-center text-xs text-gray-400 pb-8 space-y-1' },
                        e('p', null, 'Grammar and syntax corrections are objectively based on standard English conventions (e.g., ', e('em', null, 'The Chicago Manual of Style'), ').'),
                        e('p', null, 'Structural analyses are derived from established academic rhetorical models (e.g., ', e('em', null, 'Graff & Birkenstein\'s "They Say / I Say"'), ').')
                    )
                )
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>

</html>
